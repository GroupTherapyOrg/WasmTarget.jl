<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julia Playground — WasmTarget.jl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #89b4fa;
    }
    header .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #run-btn {
      background: #a6e3a1;
      color: #1e1e2e;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #run-btn:hover { background: #94e2d5; }
    #run-btn:disabled { background: #585b70; color: #a6adc8; cursor: wait; }
    #status {
      font-size: 12px;
      color: #a6adc8;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-pane {
      flex: 1;
      overflow: auto;
      min-height: 200px;
    }
    .output-pane {
      height: 200px;
      min-height: 80px;
      background: #11111b;
      border-top: 1px solid #313244;
      display: flex;
      flex-direction: column;
    }
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      font-size: 12px;
      color: #a6adc8;
    }
    #output {
      flex: 1;
      padding: 8px 12px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #output .error { color: #f38ba8; }
    #output .info { color: #a6adc8; font-style: italic; }

    /* CodeMirror theme overrides */
    .cm-editor { height: 100%; }
    .cm-editor .cm-scroller { overflow: auto; }
    .cm-editor .cm-content { font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 14px; }
    .cm-editor.cm-focused { outline: none; }
  </style>
</head>
<body>
  <header>
    <h1>Julia Playground</h1>
    <div class="actions">
      <span id="status"></span>
      <button id="run-btn">Run (Ctrl+Enter)</button>
    </div>
  </header>

  <div class="main">
    <div class="editor-pane" id="editor"></div>
    <div class="output-pane">
      <div class="output-header">
        <span>Output</span>
        <button id="clear-btn" style="background:none;border:none;color:#a6adc8;cursor:pointer;font-size:12px;">Clear</button>
      </div>
      <div id="output"><span class="info">Press Run or Ctrl+Enter to compile and execute.</span></div>
    </div>
  </div>

  <!-- CodeMirror 6 via CDN -->
  <script type="module">
    // Import CodeMirror packages from esm.sh CDN
    import {EditorView, basicSetup} from "https://esm.sh/@codemirror/basic-setup@0.20.0";
    import {keymap} from "https://esm.sh/@codemirror/view@6.36.8";
    import {EditorState} from "https://esm.sh/@codemirror/state@6.5.2";
    import {oneDark} from "https://esm.sh/@codemirror/theme-one-dark@6.1.2";
    import {linter, lintGutter} from "https://esm.sh/@codemirror/lint@6.8.4";

    // Julia language support
    let juliaLang;
    try {
      const mod = await import("https://esm.sh/@plutojl/lang-julia@0.2.1");
      juliaLang = mod.julia();
    } catch (e) {
      console.warn("Julia language support not available, falling back to plain text:", e);
      juliaLang = null;
    }

    const COMPILE_URL = (new URLSearchParams(window.location.search)).get("server") || "http://localhost:8080";
    const OFFLINE_MODE = (new URLSearchParams(window.location.search)).get("offline") === "true";

    // Binaryen.js for offline mode
    let binaryenMerger = null;
    async function initBinaryen() {
      try {
        const { BinaryenMerger } = await import("./binaryen-merge.js");
        binaryenMerger = new BinaryenMerger();
        const ok = await binaryenMerger.init();
        if (ok) {
          console.log("[Playground] Binaryen.js available for offline mode");
        }
        return ok;
      } catch (e) {
        console.warn("[Playground] Binaryen.js not available:", e.message);
        return false;
      }
    }

    // Pre-load base.wasm via compileStreaming (benefits from V8 code caching on second load)
    let baseModule = null;
    let serverAvailable = !OFFLINE_MODE;

    WebAssembly.compileStreaming(fetch(COMPILE_URL + "/base.wasm"))
      .then(mod => {
        baseModule = mod;
        serverAvailable = true;
        console.log("base.wasm pre-compiled (" + (baseModule ? "cached" : "fresh") + ")");
      })
      .catch(e => {
        console.warn("base.wasm pre-load failed:", e);
        serverAvailable = false;
        // Try loading Binaryen.js for offline mode
        initBinaryen();
      });

    const defaultCode = `# Julia Playground — powered by WasmTarget.jl
# Your code is compiled to WebAssembly and executed in the browser.

println("Hello from Julia!")
println("1 + 1 = ", 1 + 1)
`;

    // Lint: compile errors shown as red underlines + gutter icons
    let currentDiagnostics = [];
    const juliaLinter = linter(() => currentDiagnostics);

    function setDiagnostics(diags) {
      currentDiagnostics = diags;
      // Force lint refresh by dispatching a reconfigure
      const tr = editor.state.update({});
      editor.dispatch(tr);
    }

    const extensions = [
      basicSetup,
      oneDark,
      juliaLinter,
      lintGutter(),
      keymap.of([{
        key: "Ctrl-Enter",
        mac: "Cmd-Enter",
        run: () => { runCode(); return true; }
      }]),
    ];
    if (juliaLang) extensions.push(juliaLang);

    const editor = new EditorView({
      state: EditorState.create({
        doc: defaultCode,
        extensions,
      }),
      parent: document.getElementById("editor"),
    });

    const runBtn = document.getElementById("run-btn");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const clearBtn = document.getElementById("clear-btn");

    clearBtn.onclick = () => { outputEl.innerHTML = ""; };

    function appendOutput(text, cls = "") {
      const span = document.createElement("span");
      if (cls) span.className = cls;
      span.textContent = text;
      outputEl.appendChild(span);
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    const EXEC_TIMEOUT_MS = 5000;
    let activeWorker = null;
    let activeTimer = null;

    function cleanupWorker() {
      if (activeTimer) { clearTimeout(activeTimer); activeTimer = null; }
      if (activeWorker) { activeWorker.terminate(); activeWorker = null; }
    }

    async function runCode() {
      const code = editor.state.doc.toString();
      if (!code.trim()) return;

      cleanupWorker();
      outputEl.innerHTML = "";
      setDiagnostics([]);  // Clear previous errors
      runBtn.disabled = true;
      statusEl.textContent = "Compiling...";

      try {
        // Step 1: Compile — try server first, fall back to offline message
        const t0 = performance.now();
        let wasmBytes;
        let compileMode = "server";

        if (serverAvailable && !OFFLINE_MODE) {
          try {
            const resp = await fetch(COMPILE_URL + "/compile", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ code }),
            });

            if (!resp.ok) {
              const err = await resp.json();
              statusEl.textContent = "Compile error";
              appendOutput("Compile error: " + (err.error || err.message || "Unknown error"), "error");

              if (err.line) {
                const doc = editor.state.doc;
                const lineNum = Math.min(err.line, doc.lines);
                const line = doc.line(lineNum);
                const from = err.column ? line.from + (err.column - 1) : line.from;
                const to = line.to;
                setDiagnostics([{
                  from, to,
                  severity: "error",
                  message: err.error || "Compile error",
                }]);
              }

              runBtn.disabled = false;
              return;
            }

            wasmBytes = await resp.arrayBuffer();
          } catch (fetchErr) {
            // Server unreachable — try offline mode
            console.warn("[Playground] Server unreachable, trying offline:", fetchErr.message);
            serverAvailable = false;
            compileMode = "offline";
          }
        } else {
          compileMode = "offline";
        }

        // Offline mode: inform user that server compilation is required
        if (compileMode === "offline" && !wasmBytes) {
          // Try to init Binaryen for validation/optimization
          if (!binaryenMerger) {
            await initBinaryen();
          }

          if (binaryenMerger && binaryenMerger.isAvailable()) {
            statusEl.textContent = "Offline — Binaryen.js loaded (server needed for compilation)";
            appendOutput("[Offline mode] Binaryen.js is available for validation and optimization.\n", "info");
            appendOutput("[Offline mode] Julia compilation requires a server. Start one with:\n", "info");
            appendOutput("  julia +1.12 --project=. scripts/serve.jl\n", "info");
          } else {
            statusEl.textContent = "Offline — no server available";
            appendOutput("[Offline mode] Compilation server is not available.\n", "error");
            appendOutput("Start the server: julia +1.12 --project=. scripts/serve.jl\n", "info");
          }
          runBtn.disabled = false;
          return;
        }

        const compileTime = performance.now() - t0;
        statusEl.textContent = `Compiled (${(compileTime / 1000).toFixed(2)}s, ${(wasmBytes.byteLength / 1024).toFixed(1)} KB)`;
        appendOutput(`[Compiled ${(wasmBytes.byteLength / 1024).toFixed(1)} KB in ${(compileTime / 1000).toFixed(2)}s]\n`, "info");

        // Step 2: Execute in Web Worker with timeout
        statusEl.textContent += " | Executing...";
        const worker = new Worker("worker.js");
        activeWorker = worker;

        activeTimer = setTimeout(() => {
          worker.terminate();
          activeWorker = null;
          activeTimer = null;
          appendOutput("\n[Execution timed out after " + (EXEC_TIMEOUT_MS / 1000) + "s]\n", "error");
          statusEl.textContent += " | Timed out";
          runBtn.disabled = false;
        }, EXEC_TIMEOUT_MS);

        worker.onmessage = (e) => {
          const msg = e.data;
          if (msg.type === "stdout") {
            appendOutput(msg.data);
          } else if (msg.type === "done") {
            cleanupWorker();
            appendOutput(`\n[Executed in ${msg.execTime.toFixed(1)}ms]\n`, "info");
            statusEl.textContent += ` | Executed (${msg.execTime.toFixed(1)}ms)`;
            runBtn.disabled = false;
          } else if (msg.type === "error") {
            cleanupWorker();
            appendOutput("Runtime error: " + msg.error + "\n", "error");
            statusEl.textContent = "Runtime error";
            runBtn.disabled = false;
          }
        };

        worker.onerror = (e) => {
          cleanupWorker();
          appendOutput("Worker error: " + e.message + "\n", "error");
          statusEl.textContent = "Worker error";
          runBtn.disabled = false;
        };

        // Transfer wasm bytes to worker (zero-copy)
        worker.postMessage({ type: "run", wasm: wasmBytes }, [wasmBytes]);

      } catch (e) {
        cleanupWorker();
        appendOutput("Error: " + e.message + "\n", "error");
        statusEl.textContent = "Error";
        runBtn.disabled = false;
      }
    }

    runBtn.onclick = runCode;
    editor.focus();
  </script>
</body>
</html>
