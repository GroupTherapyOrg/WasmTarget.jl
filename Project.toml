authors = ["Dale Black"]

[deps]
JSON = "682c06a0-de6a-54ab-a142-c8b1cf79cde6"
PrecompileTools = "aea7be01-6a6a-4083-8856-8a6e6704d82a"

[weakdeps]
Dates = "ade2ca70-3891-5945-98fb-dc099432e06a"
DiffEqBase = "2b5f629d-d688-5b77-993f-72d75c75574e"
ForwardDiff = "f6369f11-7733-5829-9624-2563aa707210"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
SHA = "ea8e919c-243c-51af-8825-aaa63cd721ce"
SciMLBase = "0bca4576-84f4-4d90-8ffe-ffa030f20462"
SimpleDiffEq = "05bca326-078c-5bf0-a5bf-ce7c7982d7fd"
SparseArrays = "2f01184e-e22b-5df5-ae63-d93ebab69eaf"
StaticArrays = "90137ffa-7385-5640-81b9-e52037218182"
Statistics = "10745b16-79ce-11e8-11f9-7d13ad32a3b2"

[extensions]
WasmTargetDatesExt = "Dates"
WasmTargetForwardDiffExt = "ForwardDiff"
WasmTargetLinearAlgebraExt = "LinearAlgebra"
WasmTargetRandomExt = ["Random", "SHA"]
WasmTargetSimpleDiffEqExt = ["SimpleDiffEq", "SciMLBase", "DiffEqBase", "LinearAlgebra"]
WasmTargetSparseArraysExt = "SparseArrays"
WasmTargetStaticArraysExt = "StaticArrays"
WasmTargetStatisticsExt = "Statistics"

[compat]
# Tilde specifiers pin to supported minor lines only: the typed-IR format the
# compiler consumes is version-specific, so each minor needs explicit support.
Aqua = "0.8"
Dates = "1"
# The SimpleDiffEq ext constructs SciMLBase's ODEFunction/ODEProblem CONCRETELY
# (explicit field layout) — version-sensitive. Pinned to the verified majors;
# re-verify the construction (ext/WasmTargetSimpleDiffEqExt.jl) on bumps.
DiffEqBase = "6, 7"
ForwardDiff = "0.10, 1"
# JSON 1.x ONLY — 0.21 silently wraps >typemax(Int64) integer literals to a
# garbage Int64 on parse, corrupting the Node-bridge decode of large-float results
# (the differential fuzzer then reports spurious wrong_value divergences).
JSON = "1"
LinearAlgebra = "1"
PrecompileTools = "1"
Random = "1"
SHA = "0.7, 1"
SciMLBase = "2, 3"
SimpleDiffEq = "1"
SparseArrays = "1"
StaticArrays = "1"
Statistics = "1"
Supposition = "0.3"
Test = "1"
julia = "~1.12, ~1.13"

[extras]
Aqua = "4c88cf16-eb10-579e-8560-4a9242c79595"
