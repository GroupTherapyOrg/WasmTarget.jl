name: Downstream
# Reactant.jl-style downstream integration testing. WasmTarget is a compiler;
# the packages that compile THROUGH it (WasmMakie figures, Therapy reactive
# islands, Snapshot.jl @bind-cell islands) are where a codegen regression
# actually shows up. So run THEIR test
# suites against this checkout of WasmTarget — a green WasmTarget unit suite is
# necessary but not sufficient. Pairs with the in-suite regression in
# test/runtests.jl (Phase 76: select_t / if-blocktype operand preservation),
# which locks the specific bug this guards against.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
jobs:
  jump-f1-nullable-layouts:
    timeout-minutes: 25
    name: MOI F1a nullable layouts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: WasmTarget.jl
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.12.6'
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: wasm-tools@1.244.0
      - name: Instantiate exact certification environment
        working-directory: WasmTarget.jl
        run: julia --startup-file=no --project=test/integration/jump -e 'import Pkg; Pkg.instantiate()'
      - name: Execute F1a native/raw/-Os/-O3 certification
        working-directory: WasmTarget.jl
        env:
          WT_VALIDATE: '1'
        run: |
          mkdir -p "$RUNNER_TEMP/jump-f1a"
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/run_f1_certification.jl \
            "$RUNNER_TEMP/jump-f1a" \
            | tee "$RUNNER_TEMP/jump-f1a/run.log"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jump-f1a-${{ matrix.os }}
          path: ${{ runner.temp }}/jump-f1a
          if-no-files-found: error

  jump-f1a-promotion-evidence:
    timeout-minutes: 15
    name: MOI F1a cross-platform promotion evidence
    needs: [jump-f1-nullable-layouts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: WasmTarget.jl
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.12.6'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: wasm-tools@1.244.0
      - name: Instantiate exact certification environment
        working-directory: WasmTarget.jl
        run: julia --startup-file=no --project=test/integration/jump -e 'import Pkg; Pkg.instantiate()'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: jump-f1a-*
          path: ${{ runner.temp }}/jump-f1a-artifacts
      - name: Enforce cross-platform F1a evidence
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/verify_f1a_promotion.jl \
            "$RUNNER_TEMP/jump-f1a-artifacts" \
            | tee "$RUNNER_TEMP/jump-f1a-promotion.json"
      - name: Prove compile-only and forged evidence are rejected
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/test_f1a_promotion_rejections.jl \
            "$RUNNER_TEMP/jump-f1a-artifacts"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jump-f1a-promotion-evidence
          path: ${{ runner.temp }}/jump-f1a-promotion.json
          if-no-files-found: error

  jump-certification:
    timeout-minutes: 25
    name: MOI/runtime prerequisites (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: WasmTarget.jl
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.12.6'
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: wasm-tools@1.244.0
      - name: Instantiate exact certification environment
        working-directory: WasmTarget.jl
        run: julia --startup-file=no --project=test/integration/jump -e 'import Pkg; Pkg.instantiate()'
      - name: Native/raw/-Os/-O3 certification
        working-directory: WasmTarget.jl
        env:
          WT_VALIDATE: '1'
        run: |
          mkdir -p "$RUNNER_TEMP/jump-core-t0"
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/run_certification.jl \
            "$RUNNER_TEMP/jump-core-t0" \
            | tee "$RUNNER_TEMP/jump-core-t0/jump-certification.json"
      - name: Hard-watchdog process-tree regression
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/test_timeout_cleanup.jl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jump-t0-${{ matrix.os }}
          path: ${{ runner.temp }}/jump-core-t0
          if-no-files-found: error

  jump-snapshot-browser:
    timeout-minutes: 30
    name: MOI/runtime Snapshot (${{ matrix.os }}, Chromium + Firefox)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: WasmTarget.jl
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.12.6'
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: wasm-tools@1.244.0
      - name: Instantiate pinned Snapshot certification environment
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump/snapshot \
            -e 'import Pkg; Pkg.instantiate()'
      - name: Install pinned browser harness
        if: runner.os == 'Linux'
        working-directory: WasmTarget.jl/test/browser
        run: |
          npm ci
          npx playwright install --with-deps chromium firefox
      - name: Install pinned browser harness
        if: runner.os != 'Linux'
        working-directory: WasmTarget.jl/test/browser
        run: |
          npm ci
          npx playwright install chromium firefox
      - name: Export split and single-file T0 notebooks
        working-directory: WasmTarget.jl
        env:
          WT_VALIDATE: '1'
        run: |
          julia --startup-file=no --project=test/integration/jump/snapshot \
            test/integration/jump/run_snapshot_t0.jl \
            "$RUNNER_TEMP/jump-snapshot-t0" \
            | tee "$RUNNER_TEMP/jump-snapshot-export.log"
      - name: Exercise every export in Chromium and Firefox
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/run_browser_t0.jl \
            "$RUNNER_TEMP/jump-snapshot-t0" \
            | tee "$RUNNER_TEMP/jump-snapshot-browser.json"
      - name: Hard-watchdog browser process-tree regression
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/test_browser_timeout_cleanup.jl
      - name: Hard-watchdog Snapshot export process-tree regression
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump/snapshot \
            test/integration/jump/test_snapshot_timeout_cleanup.jl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jump-t0-snapshot-browser-${{ matrix.os }}
          path: |
            ${{ runner.temp }}/jump-snapshot-t0
            ${{ runner.temp }}/jump-snapshot-export.log
            ${{ runner.temp }}/jump-snapshot-browser.json
          if-no-files-found: error

  jump-t0-promotion-evidence:
    timeout-minutes: 10
    name: MOI/runtime prerequisite promotion
    needs: [jump-certification, jump-snapshot-browser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          path: WasmTarget.jl
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.12.6'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24.18.0'
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: wasm-tools@1.244.0
      - name: Instantiate exact certification environment
        working-directory: WasmTarget.jl
        run: julia --startup-file=no --project=test/integration/jump -e 'import Pkg; Pkg.instantiate()'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: jump-t0-*
          path: artifacts
      - name: Enforce cross-platform prerequisite evidence linkage
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/verify_t0_promotion.jl \
            ../artifacts \
            | tee "$RUNNER_TEMP/jump-t0-promotion.json"
      - name: Prove forged prerequisite evidence is rejected
        working-directory: WasmTarget.jl
        run: |
          julia --startup-file=no --project=test/integration/jump \
            test/integration/jump/test_promotion_rejections.jl \
            ../artifacts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jump-t0-promotion-evidence
          path: ${{ runner.temp }}/jump-t0-promotion.json
          if-no-files-found: error

  downstream:
    timeout-minutes: 60   # hang guard (see ci.yml note)
    name: ${{ matrix.pkg }} (downstream)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [WasmMakie.jl, Therapy.jl, Snapshot.jl]
    steps:
      # This WasmTarget checkout is the version under test. The downstream test
      # environments resolve it via a sibling path (WasmMakie's test [sources]
      # points at ../../WasmTarget.jl) or via Pkg.develop (Therapy), so their
      # suites exercise THIS codegen rather than a registered release.
      - uses: actions/checkout@v4
        with:
          path: WasmTarget.jl
      - uses: actions/checkout@v4
        with:
          repository: GroupTherapyOrg/WasmMakie.jl
          ref: ${{ vars.WASMMAKIE_DOWNSTREAM_REF || 'main' }}
          path: WasmMakie.jl
      - uses: actions/checkout@v4
        with:
          repository: GroupTherapyOrg/Therapy.jl
          ref: ${{ vars.THERAPY_DOWNSTREAM_REF || 'main' }}
          path: Therapy.jl
      - uses: actions/checkout@v4
        with:
          repository: GroupTherapyOrg/Snapshot.jl
          ref: ${{ vars.SNAPSHOT_DOWNSTREAM_REF || 'main' }}
          path: Snapshot.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      # WasmMakie's suite compiles dozens of real Makie figures through
      # WasmTarget and validates every emitted module — the densest downstream
      # codegen signal. Its test env already sources WasmTarget from
      # ../../WasmTarget.jl (this checkout).
      - name: WasmMakie.jl test suite
        if: matrix.pkg == 'WasmMakie.jl'
        working-directory: WasmMakie.jl
        env:
          WASMMAKIE_SKIP_C002: '1'
        run: |
          julia --project=test -e 'import Pkg; Pkg.instantiate()'
          julia --project=test test/c002_parity.jl
          julia --project=test test/runtests.jl

      # Therapy compiles reactive @island components (the dashboard that the
      # select_t fix unblocked). Point its env at this WasmTarget and run its
      # suite.
      - name: Therapy.jl test suite
        if: matrix.pkg == 'Therapy.jl'
        working-directory: Therapy.jl
        run: |
          julia --project=. -e 'import Pkg; Pkg.develop(Pkg.PackageSpec(path="../WasmTarget.jl")); Pkg.instantiate()'
          julia --project=. -e 'import Pkg; Pkg.test()'

      # Snapshot.jl compiles Pluto @bind-cell groups to WASM islands through
      # WasmTarget and verifies each with a differential oracle (native vs wasm) —
      # the closest signal to the real notebook-export use case. Its Project.toml
      # sources WasmTarget from ../WasmTarget.jl (this checkout). A deliberate
      # breaking WasmTarget release must be coordinated with Snapshot's selected
      # integration ref. Compat failure is a red downstream gate, never a skip.
      - name: Snapshot.jl test suite
        if: matrix.pkg == 'Snapshot.jl'
        working-directory: Snapshot.jl
        run: |
          julia --project=. -e 'import Pkg; Pkg.develop(Pkg.PackageSpec(path="../WasmTarget.jl")); Pkg.instantiate()'
          julia --project=. -e 'import Pkg; Pkg.test()'
