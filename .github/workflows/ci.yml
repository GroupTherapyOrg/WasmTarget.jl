name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wasm-tools
        run: cargo install wasm-tools

      - name: Install Binaryen (wasm-opt)
        shell: bash
        run: |
          set -euo pipefail
          BINARYEN_VERSION=125
          case "${{ runner.os }}" in
            Linux)
              PLATFORM="x86_64-linux"
              ARCHIVE_EXT="tar.gz"
              ;;
            macOS)
              if [ "$(uname -m)" = "arm64" ]; then
                PLATFORM="arm64-macos"
              else
                PLATFORM="x86_64-macos"
              fi
              ARCHIVE_EXT="tar.gz"
              ;;
            Windows)
              PLATFORM="x86_64-windows"
              ARCHIVE_EXT="tar.gz"
              ;;
          esac
          URL="https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/binaryen-version_${BINARYEN_VERSION}-${PLATFORM}.${ARCHIVE_EXT}"
          echo "Downloading $URL"
          curl -fL -o binaryen.tar.gz "$URL"
          tar -xzf binaryen.tar.gz
          BINARYEN_BIN="$(pwd)/binaryen-version_${BINARYEN_VERSION}/bin"
          # On Windows the Git Bash $PWD is MSYS-format (/d/a/...), which Julia's
          # Sys.which() cannot resolve. Convert to native Windows form before
          # appending to $GITHUB_PATH so subsequent (non-bash) steps find wasm-opt.exe.
          if [ "${{ runner.os }}" = "Windows" ]; then
            BINARYEN_BIN="$(cygpath -w "$BINARYEN_BIN")"
          fi
          echo "$BINARYEN_BIN" >> "$GITHUB_PATH"
          # Sanity check — invoke via the just-extracted path.
          if [ "${{ runner.os }}" = "Windows" ]; then
            "$(cygpath -u "$BINARYEN_BIN")/wasm-opt.exe" --version
          else
            "$BINARYEN_BIN/wasm-opt" --version
          fi

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Run tests
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'
