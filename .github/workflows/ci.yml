name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wasm-tools
        run: |
          cargo install wasm-tools
        if: runner.os == 'Linux'

      - name: Install wasm-tools (macOS)
        run: |
          cargo install wasm-tools
        if: runner.os == 'macOS'

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Run tests
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'
