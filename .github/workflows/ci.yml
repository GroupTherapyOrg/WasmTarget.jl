name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # A hung worker must SELF-KILL, not sit on GitHub's 6-hour default.
    timeout-minutes: 75
    name: Julia ${{ matrix.version }} - ${{ matrix.target.os }} - ${{ matrix.target.slice }}
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          # ~1.13.0-0 admits prereleases (rc) until 1.13.0 final lands
          - '~1.13.0-0'
        target:
          # Unix runners have already proven the bounded local orchestrator.
          - { os: ubuntu-latest, slice: all, shard: '', fuzz: '' }
          - { os: macos-latest, slice: all, shard: '', fuzz: '' }
          # On Windows, make each compiler shard and fuzz pass an independently
          # bounded job. The local orchestrator buffers child logs and blocks on
          # the first process, which hid the responsible shard until job timeout.
          - { os: windows-latest, slice: shard-0, shard: '0,4', fuzz: '' }
          - { os: windows-latest, slice: shard-1, shard: '1,4', fuzz: '' }
          - { os: windows-latest, slice: shard-2, shard: '2,4', fuzz: '' }
          - { os: windows-latest, slice: shard-3, shard: '3,4', fuzz: '' }
          - { os: windows-latest, slice: fuzz, shard: '', fuzz: '1' }
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Prebuilt binary (seconds) instead of `cargo install wasm-tools`, which
      # compiled wasm-tools from source on every job (~5-10 min x 6 matrix jobs,
      # never cached). Matches what downstream.yml already uses.
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Run tests
        env:
          WT_SHARD: ${{ matrix.target.shard }}
          WT_FUZZ: ${{ matrix.target.fuzz }}
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'
