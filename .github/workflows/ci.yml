name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # A hung worker must SELF-KILL, not sit on GitHub's 6-hour default.
    # Windows runs two shard processes at a time below, so allow its two
    # batches to drain while keeping the tighter Unix bound.
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 120 || 75 }}
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
          # ~1.13.0-0 admits prereleases (rc) until 1.13.0 final lands
          - '~1.13.0-0'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Prebuilt binary (seconds) instead of `cargo install wasm-tools`, which
      # compiled wasm-tools from source on every job (~5-10 min x 6 matrix jobs,
      # never cached). Matches what downstream.yml already uses.
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Run tests
        env:
          # Four compiler shards plus fuzz exhausted the Windows runner's
          # effective CPU/memory budget and repeatedly failed to drain the
          # first batch. Keep the exact suite, but bound local concurrency.
          WT_TEST_CONCURRENCY: ${{ runner.os == 'Windows' && '2' || '' }}
        run: |
          julia --project=. -e 'using Pkg; Pkg.test()'
