name: Build and Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout WasmTarget.jl
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        env:
          # Bypass the pkg-server snapshot cache — resolve against General's
          # git state so freshly registered deps (Therapy releases) are
          # visible immediately instead of after CDN propagation.
          JULIA_PKG_SERVER: ""
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.Registry.add("General")
            # add() is a NO-OP when the actions cache already holds a General clone —
            # update() is what actually pulls newly registered packages (WasmMakie).
            Pkg.Registry.update()
            Pkg.resolve()
            Pkg.instantiate()
          '

      - name: Build docs
        run: |
          julia --project=docs --optimize=3 docs/app.jl build

      - name: Verify interactive docs islands compiled
        run: |
          grep -F 'window.TherapyHydrate["examplelorenz"]' docs/dist/index.html
          julia --project=. test/verify_lorenz_docs.jl docs/dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
