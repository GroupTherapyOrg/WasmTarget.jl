name: Build and Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install docs dependencies
        # docs/Project.toml already pins WasmTarget = {path = ".."} via [sources],
        # so plain Pkg.instantiate is enough. The previous Pkg.develop(path=".")
        # tried to add WasmTarget a second time and failed with
        # "Refusing to add package WasmTarget — same name already exists".
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.instantiate()
          '

      - name: Build WASM examples
        run: julia --project=docs docs/build_wasm_examples.jl

      - name: Build docs
        run: julia --project=docs docs/make.jl
        env:
          CI: "true"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
